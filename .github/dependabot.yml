version: 2

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, github-actions]

  # Client npm packages
  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    labels: [dependencies, frontend]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Server npm packages
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    labels: [dependencies, backend]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
