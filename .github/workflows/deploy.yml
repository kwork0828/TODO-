name: Deploy — Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel a running prod deploy

jobs:
  # ── 1. Lint & build gate ─────────────────────────────────────────────────
  gate:
    name: Build Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build client
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

      - name: Install & build server
        working-directory: server
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  # ── 2. Deploy frontend → Vercel ──────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: client
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build for Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN 2>&1 | tail -1)
          echo "deployment_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

  # ── 3. Deploy backend → Railway ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      railway_url: ${{ steps.deploy.outputs.railway_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Trigger Railway deployment via GraphQL API
          curl -s "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw '{"query":"mutation { deploymentCreate(input: { serviceId: \"07e4728a-f7c3-4a46-b9c9-04fb4bf689d6\", environmentId: \"8f33c781-a1eb-418b-9534-6ce542fae161\" }) { id } }"}' \
            | grep -q '"id"'
          echo "railway_url=https://${{ secrets.RAILWAY_PUBLIC_URL }}" >> $GITHUB_OUTPUT

  # ── 4. Health checks ─────────────────────────────────────────────────────
  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    steps:
      - name: Wait for deployments to stabilise
        run: sleep 20

      - name: Check backend health
        run: |
          BACKEND_URL="${{ secrets.RAILWAY_PUBLIC_URL }}"
          echo "Checking backend: https://$BACKEND_URL/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://$BACKEND_URL/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Backend healthy (HTTP $STATUS)"

      - name: Check frontend health
        run: |
          FRONTEND_URL="${{ needs.deploy-frontend.outputs.deployment_url }}"
          echo "Checking frontend: $FRONTEND_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$FRONTEND_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Frontend healthy (HTTP $STATUS)"

      - name: Notify success
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const body = [
              '## ✅ 프로덕션 배포 성공',
              '',
              `| 서비스 | URL |`,
              `|--------|-----|`,
              `| 🌐 Frontend | ${{ needs.deploy-frontend.outputs.deployment_url }} |`,
              `| ⚙️ Backend  | https://${{ secrets.RAILWAY_PUBLIC_URL }} |`,
              '',
              `커밋: \`${context.sha.slice(0,7)}\`  |  배포 시각: ${new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' })}`,
            ].join('\n');

            // Post as commit status comment on latest commit
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

      - name: Notify failure
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## ❌ 프로덕션 배포 실패\n\n헬스체크에서 오류가 감지되었습니다. [Actions 로그](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})를 확인해 주세요.`,
            });
